<body></body>
<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<input type="file" id="gif-input" accept="image/gif,image/*" style="position:fixed;top:16px;left:16px;z-index:1000;"> 
<script>
  /* global nn */
  let gifSrc = "kirby.gif"
  
  document.getElementById('gif-input').addEventListener('change', function() {
    const file = this.files[0]
    if (!file) return
    gifSrc = URL.createObjectURL(file)
  })
  

  function draw () {
    if (nn.mouseDown) {
      //let x = nn.random(nn.width)
      //let y = nn.random(nn.height)
      let x = nn.mouseX
      let y = nn.mouseY
      let hue = nn.random(360)
      nn.create('img')
        .set('src', gifSrc)
        .css('user-select', 'none')
        .hueRotate(hue)
        .position(x, y)
        .scale(1)
        .rotate(hue)
        .addTo('body')
    }

  }

  //nn.times(30, draw)

  nn.on('mousemove', draw)
</script>
